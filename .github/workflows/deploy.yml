name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [ main ]
    paths:
      - "neuro/**"
      - "symbolic/**"

jobs:
  deploy-gradio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Ensure full history for git diff

      - name: Check if neuro changed
        id: neuro_changed
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "^neuro/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.neuro_changed.outputs.changed == 'true'
        run: pip install "huggingface_hub[cli]"

      - name: Deploy Gradio Space
        if: steps.neuro_changed.outputs.changed == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          huggingface_hub upload neuro/ \
            --repo m97j/neuro-engine \
            --token $HF_TOKEN

  deploy-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Ensure full history for git diff

      - name: Check if symbolic changed
        id: symbolic_changed
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "^symbolic/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.symbolic_changed.outputs.changed == 'true'
        run: pip install "huggingface_hub[cli]"

      - name: Deploy Docker Space
        if: steps.symbolic_changed.outputs.changed == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          huggingface_hub upload symbolic/ \
            --repo m97j/symbolic-processor \
            --token $HF_TOKEN
