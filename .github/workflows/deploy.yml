name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [ main ]
    paths:
      - "neuro/**"
      - "symbolic/**"

jobs:
  deploy-gradio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Ensure full history for git diff

      - name: Check if neuro changed
        id: neuro_changed
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "^neuro/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.neuro_changed.outputs.changed == 'true'
        run: pip install "huggingface_hub[cli]"

      - name: Deploy Gradio Space
        if: steps.neuro_changed.outputs.changed == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HUB_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | grep "^neuro/")

          ARGS=""
          for FILE in $CHANGED_FILES; do
            BASENAME=$(basename "$FILE")
            ARGS="$ARGS --files $FILE:$BASENAME"
          done

          hf api commit \
            --repo-id m97j/neuro-engine \
            --repo-type space \
            --commit-message "$HF_HUB_COMMIT_MESSAGE" \
            $ARGS


  deploy-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Ensure full history for git diff

      - name: Check if symbolic changed
        id: symbolic_changed
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "^symbolic/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.symbolic_changed.outputs.changed == 'true'
        run: pip install "huggingface_hub[cli]"

      - name: Deploy Docker Space
        if: steps.symbolic_changed.outputs.changed == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HUB_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | grep "^symbolic/")

          ARGS=""
          for FILE in $CHANGED_FILES; do
            BASENAME=$(basename "$FILE")
            ARGS="$ARGS --files $FILE:$BASENAME"
          done

          hf api commit \
            --repo-id m97j/symbolic-processor \
            --repo-type space \
            --commit-message "$HF_HUB_COMMIT_MESSAGE" \
            $ARGS
